<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-помощник | База знаний компании</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: #1a1a1a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
    }

    header h1 { font-size: 16px; font-weight: 600; }
    header p { font-size: 13px; color: #888; }

    .badge {
      margin-left: auto;
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 720px;
      width: 100%;
    }

    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .user .bubble {
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-bottom-left-radius: 4px;
    }

    .assistant .bubble.loading::after {
      content: "▋";
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .hint {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      margin: auto;
    }

    .hints {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }

    .hint-chip {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .hint-chip:hover { border-color: #1a1a1a; }

    footer {
      background: #fff;
      border-top: 1px solid #e5e5e5;
      padding: 16px 24px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
    }

    textarea {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      max-height: 120px;
    }

    textarea:focus { border-color: #1a1a1a; }

    button {
      padding: 12px 20px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:disabled { opacity: 0.4; cursor: default; }
    button:hover:not(:disabled) { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <div class="logo">AI</div>
  <div>
    <h1>AI-помощник</h1>
    <p>База знаний компании</p>
  </div>
  <span class="badge">Онлайн</span>
</header>

<div id="chat">
  <div class="hint">
    <p>Задайте вопрос — отвечу строго по документам компании.</p>
    <div class="hints">
      <span class="hint-chip" onclick="ask(this.textContent)">Как оформить отпуск?</span>
      <span class="hint-chip" onclick="ask(this.textContent)">Какой дресс-код в офисе?</span>
      <span class="hint-chip" onclick="ask(this.textContent)">Как подать заявку на командировку?</span>
      <span class="hint-chip" onclick="ask(this.textContent)">Условия испытательного срока?</span>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea
      id="input"
      placeholder="Введите вопрос..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()">Отправить</button>
  </div>
</footer>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const btn = document.getElementById("send-btn");
  let busy = false;

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function ask(text) {
    input.value = text;
    sendMessage();
  }

  function appendMessage(role, text = "") {
    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble" + (role === "assistant" && text === "" ? " loading" : "");
    bubble.textContent = text;
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const question = input.value.trim();
    if (!question || busy) return;

    // clear hint block on first message
    const hint = chat.querySelector(".hint");
    if (hint) hint.remove();

    busy = true;
    btn.disabled = true;
    input.value = "";
    input.style.height = "auto";

    appendMessage("user", question);
    const bubble = appendMessage("assistant");

    try {
      const resp = await fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });

      if (!resp.ok) throw new Error("Server error");

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let result = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        result += decoder.decode(value, { stream: true });
        bubble.textContent = result;
        bubble.classList.remove("loading");
        chat.scrollTop = chat.scrollHeight;
      }
    } catch (e) {
      bubble.textContent = "Ошибка соединения. Попробуйте ещё раз.";
      bubble.classList.remove("loading");
    } finally {
      busy = false;
      btn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
